<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Temperature Converter</title>

    <link rel="stylesheet" href="DhruvHastiyan_task3.css">
</head>
<body>

<div class="container">

    <div class="left">

        <div class="thermometer">🌡️</div>

        <h1>Smart Temperature Converter</h1>

        <p>
            Instantly convert temperatures between
            Celsius, Fahrenheit and Kelvin.
        </p>

    </div>

    <div class="right">

        <h2>Convert Temperature</h2>

        <div class="input-group">
            <label>Enter Temperature</label>
            <input type="number" id="temp" placeholder="Enter value">
        </div>

        <div class="input-group">
            <label>Convert From</label>
            <select id="fromUnit">
                <option value="C">Celsius (°C)</option>
                <option value="F">Fahrenheit (°F)</option>
                <option value="K">Kelvin (K)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Convert To</label>
            <select id="toUnit">
                <option value="F">Fahrenheit (°F)</option>
                <option value="C">Celsius (°C)</option>
                <option value="K">Kelvin (K)</option>
            </select>
        </div>

        <button onclick="convertTemperature()">
            Convert
        </button>

        <div class="result">
            <h3>Result</h3>
            <div id="output">--</div>
        </div>

    </div>

</div>

<script src="DhruvHastiyan_task3.js"></script>

</body>
</html>
